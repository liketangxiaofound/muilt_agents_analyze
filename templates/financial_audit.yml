id: financial_audit
name: "财务审计分析"
description: "分析财务报表，识别支出趋势、异常科目、结构占比和排名"
icon: "💰"
applicable:
  file_types: [xlsx, xls, csv]
  keywords: [财务, 支出, 预算, 科目, 审计, 经费, 资金]
  min_files: 1
  max_files: 1
analysis:
  methods:
    - statistical_summary
    - trend_analysis
    - anomaly_detection
    - ranking
  hints:
    time_column: "日期"
    metric_columns: ["金额", "支出", "收入", "预算"]
    category_column: "科目"
report:
  template: executive_dashboard
  title_template: "{{file_name}} — 财务审计分析报告"
  sections:
    - summary_cards
    - trend_chart
    - anomaly_table
    - ranking_chart
    - recommendations
